name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发

jobs:
  # 微信云函数部署（通过 miniprogram-ci）
  deploy-cloud-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Write upload key
        run: echo '${{ secrets.WX_UPLOAD_KEY }}' > /tmp/upload-key.key

      - name: Upload cloud functions
        run: |
          for fn in login api remind autoRegister; do
            echo "--- Deploying $fn ---"
            miniprogram-ci cloud --type uploadFunction \
              --appid ${{ secrets.WX_APPID }} \
              --privateKeyPath /tmp/upload-key.key \
              --env ${{ secrets.WX_ENV_ID }} \
              --name $fn \
              --path cloudfunctions/$fn \
              --remoteNpmInstall true || echo "⚠️ $fn deploy failed, continuing..."
          done

  # Discord 命令注册
  register-discord-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Register Discord commands
        env:
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node web/scripts/register-commands.mjs
