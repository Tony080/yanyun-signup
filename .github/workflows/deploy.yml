name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发

jobs:
  # Web 版由 Vercel 自动部署（GitHub 集成），这里不需要额外处理

  # 云函数部署
  deploy-cloud-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy login function
        run: tcb fn deploy login --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/login
        continue-on-error: true

      - name: Deploy api function
        run: tcb fn deploy api --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/api
        continue-on-error: true

      - name: Deploy remind function
        run: tcb fn deploy remind --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/remind
        continue-on-error: true

      - name: Deploy autoRegister function
        run: tcb fn deploy autoRegister --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/autoRegister
        continue-on-error: true

  # Discord 命令注册（仅当命令定义文件变更时）
  register-discord-commands:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'web/scripts/register-commands.mjs') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Register Discord commands
        env:
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node web/scripts/register-commands.mjs
