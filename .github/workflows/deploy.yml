name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发

jobs:
  # Web 版由 Vercel 自动部署（GitHub 集成），这里不需要额外处理

  # 云函数部署
  deploy-cloud-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy login function
        run: tcb fn deploy login --envId ${{ secrets.WX_ENV_ID }} --codeSecret ${{ secrets.WX_ENV_ID }} --path cloudfunctions/login
        continue-on-error: true

      - name: Deploy api function
        run: tcb fn deploy api --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/api
        continue-on-error: true

      - name: Deploy remind function
        run: tcb fn deploy remind --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/remind
        continue-on-error: true

      - name: Deploy autoRegister function
        run: tcb fn deploy autoRegister --envId ${{ secrets.WX_ENV_ID }} --path cloudfunctions/autoRegister
        continue-on-error: true
