name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发

jobs:
  deploy-cloud-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy login
        run: tcb fn deploy login --env-id ${{ secrets.WX_ENV_ID }} --dir cloudfunctions/login
        continue-on-error: true

      - name: Deploy api
        run: tcb fn deploy api --env-id ${{ secrets.WX_ENV_ID }} --dir cloudfunctions/api
        continue-on-error: true

      - name: Deploy remind
        run: tcb fn deploy remind --env-id ${{ secrets.WX_ENV_ID }} --dir cloudfunctions/remind
        continue-on-error: true

      - name: Deploy autoRegister
        run: tcb fn deploy autoRegister --env-id ${{ secrets.WX_ENV_ID }} --dir cloudfunctions/autoRegister
        continue-on-error: true

  register-discord-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if commands changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'web/scripts/register-commands.mjs'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Register Discord commands
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node web/scripts/register-commands.mjs
